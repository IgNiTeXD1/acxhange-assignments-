<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Assignment 2</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>User Registration</h1>

        <form id="userForm">

            <!-- NAME -->

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                >

                <small
                    class="error"
                    id="nameError"
                ></small>

            </div>

            <!-- EMAIL -->

            <div class="form-group">

                <label>Email</label>

                <input
                    type="text"
                    id="email"
                    placeholder="Enter your email"
                >

                <small
                    class="error"
                    id="emailError"
                ></small>

            </div>

            <!-- PHONE -->

            <div class="form-group">

                <label>Phone Number</label>

                <input
                    type="text"
                    id="phone"
                    placeholder="9876543210"
                >

                <small
                    class="error"
                    id="phoneError"
                ></small>

            </div>

            <!-- ADDRESS -->

            <div class="form-group">

                <label>Address</label>

                <textarea
                    id="address"
                    maxlength="200"
                    placeholder="Enter your address"
                ></textarea>

                <div class="char-counter">

                    <span id="charCount">0</span>/200

                </div>

                <small
                    class="error"
                    id="addressError"
                ></small>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <label>Password</label>

                <div class="password-container">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                    >

                    <button
                        type="button"
                        id="togglePassword"
                    >
                        👁
                    </button>

                </div>

                <!-- STRENGTH BAR -->

                <div class="strength-container">

                    <div id="strengthBar"></div>

                </div>

                <p id="strengthText">
                    Strength: None
                </p>

                <small
                    class="error"
                    id="passwordError"
                ></small>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="form-group">

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                >

                <small
                    class="error"
                    id="confirmPasswordError"
                ></small>

            </div>

            <!-- BUTTON -->

            <button type="submit">

                Submit

            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
